# ══════════════════════════════════════════════════════════════
# tmux.conf — the_architect | dark glass · 2026
# ══════════════════════════════════════════════════════════════

# ── Core ──────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# ── Prefix ────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Splits ────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Vim navigation ───────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize ────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload ────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ── Copy mode (vi) ───────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# ══════════════════════════════════════════════════════════════
# STATUS LINE — dark glass
# ══════════════════════════════════════════════════════════════

set -g status on
set -g status-position top
set -g status-interval 2
set -g status-justify left

# ── Colors ────────────────────────────────────────────────────
set -g status-style "bg=#11111b,fg=#585b70"
set -g message-style "bg=#181825,fg=#cdd6f4"
set -g message-command-style "bg=#181825,fg=#cdd6f4"
set -g mode-style "bg=#313244,fg=#cdd6f4"

# ── Panes ─────────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── Left status ──────────────────────────────────────────────
set -g status-left-length 40
set -g status-left "#[fg=#11111b,bg=#89b4fa,bold]  #S #[bg=#11111b] "

# ── Right status ─────────────────────────────────────────────
set -g status-right-length 80
set -g status-right "#[fg=#585b70] #{?client_prefix,#[fg=#cba6f7]PREFIX ,}#{?pane_in_mode,#[fg=#f9e2af]COPY ,}#{?window_zoomed_flag,#[fg=#a6e3a1]ZOOM ,}#[fg=#45475a]│ #[fg=#585b70]#h #[fg=#45475a]│ #[fg=#6c7086]%H:%M "

# ── Windows ───────────────────────────────────────────────────
set -g window-status-format "#[fg=#45475a] #I#[fg=#585b70]:#W "
set -g window-status-current-format "#[fg=#89b4fa,bold] #I#[fg=#bac2de]:#W "
set -g window-status-separator ""

# ── Activity ──────────────────────────────────────────────────
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#f9e2af"
