# ══════════════════════════════════════════════════════════════
# picom.conf — the_architect | compositor
# ══════════════════════════════════════════════════════════════

# ── Shadows ───────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.75;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'i3-frame'",
    "class_g = 'polybar'",
];

# ── Fading ────────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.05;
fade-out-step = 0.05;
fade-delta    = 4;

# ── Transparency ──────────────────────────────────────────────
inactive-opacity = 0.92;
active-opacity   = 1.0;
frame-opacity    = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "100:class_g = 'Alacritty' && focused",
    "90:class_g = 'Alacritty' && !focused",
    "100:class_g = 'firefox'",
    "100:class_g = 'Cursor'",
];

# ── Blur ──────────────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;

# ── Backend ───────────────────────────────────────────────────
backend = "glx";
vsync   = true;

# ── Performance ───────────────────────────────────────────────
mark-wmwin-focused    = true;
mark-ovredir-focused  = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win   = true;
detect-transient      = true;
glx-no-stencil        = true;
