# ══════════════════════════════════════════════════════════════
# picom.conf — the_architect | glassy dark compositor
# ══════════════════════════════════════════════════════════════

# ── Backend ───────────────────────────────────────────────────
backend = "glx";
vsync = true;

# ── Rounded corners ──────────────────────────────────────────
corner-radius = 10;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'",
    "class_g *= 'eww-'",
    "class_g = 'sl1c3d-cli'",
];

# ── Shadows ───────────────────────────────────────────────────
shadow = true;
shadow-radius = 16;
shadow-opacity = 0.6;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color = "#000000";
shadow-exclude = [
    "name = 'Notification'",
    "class_g ?= 'Notify-osd'",
    "_GTK_FRAME_EXTENTS",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'",
    "class_g *= 'eww-'",
    "class_g = 'sl1c3d-cli'",
];

# ── Fading ────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;
no-fading-openclose = false;

# ── Transparency ──────────────────────────────────────────────
inactive-opacity = 0.82;
active-opacity = 0.95;
frame-opacity = 0.85;
inactive-opacity-override = false;

opacity-rule = [
    "85:class_g = 'Alacritty' && focused",
    "72:class_g = 'Alacritty' && !focused",
    "95:class_g = 'Brave-browser' && focused",
    "85:class_g = 'Brave-browser' && !focused",
    "95:class_g = 'firefox' && focused",
    "85:class_g = 'firefox' && !focused",
    "95:class_g = 'Cursor' && focused",
    "85:class_g = 'Cursor' && !focused",
    "100:class_g = 'mpv'",
    "80:class_g = 'Rofi'",
    "100:class_g *= 'eww-'",
    "100:class_g = 'sl1c3d-cli'",
];

# ── Blur ──────────────────────────────────────────────────────
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 8;
blur-background-frame = true;
blur-background-fixed = false;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS",
    "class_g = 'sl1c3d-cli'",
];

# ── Performance ───────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
detect-transient = true;
use-damage = true;

# ── Window type overrides ────────────────────────────────────
wintypes: {
    tooltip = { fade = true; shadow = true; opacity = 0.85; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.9; shadow = true; };
    dropdown_menu = { opacity = 0.9; shadow = true; };
};
