# ══════════════════════════════════════════════════════════════
# Alacritty config — the_architect | 2026
# Colors via import from matugen-generated theme file
# ══════════════════════════════════════════════════════════════

import = ["~/.config/alacritty/theme.toml"]

[env]
TERM = "xterm-256color"

[window]
padding     = { x = 10, y = 8 }
decorations = "none"
opacity     = 0.95
dynamic_title = true

[scrolling]
history    = 10000
multiplier = 5

[font]
normal  = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold    = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic  = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size    = 12.0

[cursor]
style = { shape = "Block", blinking = "On" }

[selection]
save_to_clipboard = true

[terminal]
osc52 = "CopyPaste"

[mouse]
bindings = [
    { mouse = "Right", mods = "Control", action = "Paste" },
    { mouse = "Middle", mods = "Shift",  action = "Paste" },
]

[keyboard]
bindings = [
    # Ctrl+Shift+Space → fzf file browser
    { key = "Space", mods = "Control|Shift", action = "SpawnNewInstance" },
]
