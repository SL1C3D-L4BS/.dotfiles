; ══════════════════════════════════════════════════════════════
; Polybar — the_architect | dark glass compound pills
; Inspired by randomboi404/eww · Catppuccin Mocha
; ══════════════════════════════════════════════════════════════

[colors]
bg        = #11111b
bg-bar    = #11111bCC
bg-mod    = #181825EE
accent    = #89b4fa
fg        = #cdd6f4
fg-dim    = #585b70
fg-muted  = #a6adc8
green     = #a6e3a1
yellow    = #f9e2af
red       = #f38ba8
mauve     = #cba6f7
cyan      = #94e2d5
sky       = #89dceb
peach     = #fab387
flamingo  = #f2cdcd
teal      = #94e2d5
surface0  = #313244
surface1  = #45475a
transparent = #00000000

; ── Main bar (Vizio 43") ─────────────────────────────────────
[bar/main]
monitor    = HDMI-A-0
width      = 98%
height     = 32
offset-x   = 1%
offset-y   = 4
radius     = 12
fixed-center = true
override-redirect = true
wm-restack = i3

background = ${colors.bg-bar}
foreground = ${colors.fg}

border-size  = 0
padding-left  = 1
padding-right = 1
module-margin = 0

; Fonts: 0=text, 1=icons-large, 2=icons-small, 3=pill-glyphs
font-0 = JetBrainsMono Nerd Font:size=9;3
font-1 = JetBrainsMono Nerd Font:size=11;4
font-2 = JetBrainsMono Nerd Font:size=9;3
font-3 = JetBrainsMono Nerd Font:size=14;5

modules-left   = logo sep i3 sep cpu memory
modules-center = date
modules-right  = gpu-temp cpu-temp sep network sep volume sep tray

cursor-click  = pointer
enable-ipc    = true

; ── Secondary bar (ONN 24" portrait) ─────────────────────────
[bar/secondary]
inherit       = bar/main
monitor       = DisplayPort-1
modules-left  = logo sep i3
modules-center = date
modules-right = cpu memory sep volume

[bar/tertiary]
inherit       = bar/main
monitor       = DisplayPort-2
modules-left  = logo sep i3
modules-center = date
modules-right = cpu memory sep volume

; ══════════════════════════════════════════════════════════════
; MODULES
; ══════════════════════════════════════════════════════════════

; ── Logo ─────────────────────────────────────────────────────
[module/logo]
type = custom/text
label = "  󰣇  "
label-background = ${colors.accent}
label-foreground = ${colors.bg}
label-font = 2
label-padding = 0

; ── Separator ────────────────────────────────────────────────
[module/sep]
type = custom/text
label = "  "
label-foreground = ${colors.transparent}

; ── i3 Workspaces ────────────────────────────────────────────
[module/i3]
type = internal/i3
format = <label-state><label-mode>
index-sort = true
wrapping-scroll = false
pin-workspaces = true
strip-wsnumbers = true

; Active workspace — accent pill
label-focused = " %name% "
label-focused-foreground = ${colors.bg}
label-focused-background = ${colors.accent}
label-focused-padding = 0

; Occupied but not focused
label-unfocused = " %name% "
label-unfocused-foreground = ${colors.fg-muted}
label-unfocused-background = ${colors.bg-mod}
label-unfocused-padding = 0

; Visible on other monitor
label-visible = " %name% "
label-visible-foreground = ${colors.fg-dim}
label-visible-background = ${colors.surface0}
label-visible-padding = 0

; Urgent
label-urgent = " %name% "
label-urgent-foreground = ${colors.bg}
label-urgent-background = ${colors.red}
label-urgent-padding = 0

; Mode (resize etc)
label-mode = " %mode% "
label-mode-foreground = ${colors.bg}
label-mode-background = ${colors.mauve}
label-mode-padding = 0

; ── CPU (compound pill: icon + text) ─────────────────────────
[module/cpu]
type = internal/cpu
interval = 2

format = <label>
format-prefix = "  "
format-prefix-background = ${colors.teal}
format-prefix-foreground = ${colors.bg}
format-prefix-font = 2

label = " %percentage:2%% "
label-background = ${colors.bg-mod}
label-foreground = ${colors.fg-muted}

; ── Memory (compound pill: icon + text) ──────────────────────
[module/memory]
type = internal/memory
interval = 2

format = <label>
format-prefix = "  "
format-prefix-background = ${colors.mauve}
format-prefix-foreground = ${colors.bg}
format-prefix-font = 2

label = " %used% "
label-background = ${colors.bg-mod}
label-foreground = ${colors.fg-muted}

; ── Date/Time (compound pill: icon + text) ───────────────────
[module/date]
type = internal/date
interval = 1
date = "%a %d %b"
time = "%H:%M"

format-prefix = " 󰥔 "
format-prefix-background = ${colors.accent}
format-prefix-foreground = ${colors.bg}
format-prefix-font = 2

label = " %date%  %time% "
label-background = ${colors.bg-mod}
label-foreground = ${colors.fg}

; ── Network (compound pill: icon + text) ─────────────────────
[module/network]
type = internal/network
interface = enp0s31f6
interval = 2

format-connected = <label-connected>
format-connected-prefix = " 󰈀 "
format-connected-prefix-background = ${colors.accent}
format-connected-prefix-foreground = ${colors.bg}
format-connected-prefix-font = 2
label-connected = " %downspeed:7%  %upspeed:7% "
label-connected-background = ${colors.bg-mod}
label-connected-foreground = ${colors.fg-muted}

format-disconnected = <label-disconnected>
format-disconnected-prefix = " 󰈀 "
format-disconnected-prefix-background = ${colors.surface1}
format-disconnected-prefix-foreground = ${colors.fg-dim}
format-disconnected-prefix-font = 2
label-disconnected = " off "
label-disconnected-background = ${colors.bg-mod}
label-disconnected-foreground = ${colors.fg-dim}

; ── Volume (compound pill: icon + text) ──────────────────────
[module/volume]
type = internal/pulseaudio

format-volume = <ramp-volume><label-volume>
label-volume = " %percentage%% "
label-volume-background = ${colors.bg-mod}
label-volume-foreground = ${colors.fg-muted}

ramp-volume-0 = "  "
ramp-volume-1 = "  "
ramp-volume-2 = "  "
ramp-volume-background = ${colors.mauve}
ramp-volume-foreground = ${colors.bg}
ramp-volume-font = 2

format-muted = <label-muted>
format-muted-prefix = "  "
format-muted-prefix-background = ${colors.surface1}
format-muted-prefix-foreground = ${colors.fg-dim}
format-muted-prefix-font = 2
label-muted = " mute "
label-muted-background = ${colors.bg-mod}
label-muted-foreground = ${colors.fg-dim}

click-right = pavucontrol &

; ── GPU Temp ─────────────────────────────────────────────────
[module/gpu-temp]
type = custom/script
exec = sensors amdgpu-pci-0100 2>/dev/null | awk '/edge/{gsub(/[+°C]/,"",$2); printf "%.0f°", $2}'
interval = 5

format-prefix = " 󰢮 "
format-prefix-background = ${colors.sky}
format-prefix-foreground = ${colors.bg}
format-prefix-font = 2

label = " %output% "
label-background = ${colors.bg-mod}
label-foreground = ${colors.fg-muted}

; ── CPU Temp ─────────────────────────────────────────────────
[module/cpu-temp]
type = custom/script
exec = sensors dell_smm-isa-00de 2>/dev/null | awk '/CPU/{gsub(/[+°C]/,"",$2); printf "%.0f°", $2}'
interval = 5

format-prefix = "  "
format-prefix-background = ${colors.flamingo}
format-prefix-foreground = ${colors.bg}
format-prefix-font = 2

label = " %output% "
label-background = ${colors.bg-mod}
label-foreground = ${colors.fg-muted}

; ── System Tray ──────────────────────────────────────────────
[module/tray]
type = internal/tray
tray-size = 14
tray-padding = 4px
tray-background = ${colors.bg-mod}
tray-foreground = ${colors.fg-muted}
tray-spacing = 4px

; ══════════════════════════════════════════════════════════════
; GLOBAL WM
; ══════════════════════════════════════════════════════════════
[settings]
screenchange-reload = true
pseudo-transparency = false

[global/wm]
margin-top = 0
margin-bottom = 0
