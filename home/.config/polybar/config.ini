; ══════════════════════════════════════════════════════════════
; Polybar config — the_architect | 2026 elite workstation
; Colors sourced from ~/.config/theme/palette (matugen)
; ══════════════════════════════════════════════════════════════

[colors]
; Import matugen palette — set by theme-apply script via Xresources
bg       = ${xrdb:background:#1e1e2e}
bg-alt   = ${xrdb:color0:#181825}
fg       = ${xrdb:foreground:#cdd6f4}
fg-dim   = ${xrdb:color8:#585b70}
accent   = ${xrdb:color4:#89b4fa}
green    = ${xrdb:color2:#a6e3a1}
yellow   = ${xrdb:color3:#f9e2af}
red      = ${xrdb:color1:#f38ba8}
magenta  = ${xrdb:color5:#cba6f7}
cyan     = ${xrdb:color6:#89dceb}

[bar/main]
monitor               = ${env:MONITOR:}
width                 = 100%
height                = 28
offset-x              = 0
offset-y              = 0
radius                = 0
fixed-center          = true

background            = ${colors.bg}
foreground            = ${colors.fg}

line-size             = 2
line-color            = ${colors.accent}

border-size           = 0
padding-left          = 2
padding-right         = 2
module-margin-left    = 1
module-margin-right   = 1

font-0 = JetBrainsMono Nerd Font:pixelsize=11;3
font-1 = JetBrainsMono Nerd Font Mono:pixelsize=14;3
font-2 = Noto Color Emoji:pixelsize=10;2

modules-left   = i3 separator xwindow
modules-center = date
modules-right  = ai-status separator cpu memory separator fs separator network separator volume separator battery

tray-position    = right
tray-padding     = 4
tray-background  = ${colors.bg}

cursor-click  = pointer
cursor-scroll = ns-resize

enable-ipc    = true

[bar/secondary]
inherit = bar/main
monitor = ${env:MONITOR2:}
tray-position = none

; ── Separator ─────────────────────────────────────────────────
[module/separator]
type   = custom/text
content = " │ "
content-foreground = ${colors.fg-dim}

; ── i3 workspaces ─────────────────────────────────────────────
[module/i3]
type                        = internal/i3
format                      = <label-state> <label-mode>
index-sort                  = true
wrapping-scroll             = false
strip-wsnumbers             = false

label-focused               = %name%
label-focused-foreground    = ${colors.fg}
label-focused-background    = ${colors.bg-alt}
label-focused-underline     = ${colors.accent}
label-focused-padding       = 2

label-unfocused             = %name%
label-unfocused-foreground  = ${colors.fg-dim}
label-unfocused-padding     = 2

label-visible               = %name%
label-visible-foreground    = ${colors.fg-dim}
label-visible-padding       = 2

label-urgent                = %name%
label-urgent-foreground     = ${colors.red}
label-urgent-background     = ${colors.bg-alt}
label-urgent-padding        = 2

label-mode-padding          = 2
label-mode-foreground       = ${colors.bg}
label-mode-background       = ${colors.accent}

; ── Active window title ────────────────────────────────────────
[module/xwindow]
type            = internal/xwindow
label           = %title:0:60:…%
label-foreground = ${colors.fg-dim}

; ── Date/time ─────────────────────────────────────────────────
[module/date]
type          = internal/date
interval      = 1
date          = "%a %b %d"
time          = "%H:%M"
label         = " %date%   %time%"
label-foreground = ${colors.fg}

; ── CPU ───────────────────────────────────────────────────────
[module/cpu]
type                  = internal/cpu
interval              = 2
format-prefix         = " "
format-prefix-foreground = ${colors.green}
label                 = %percentage:2%%
label-foreground      = ${colors.fg}
warn-percentage       = 80
format-warn-prefix    = " "
format-warn-prefix-foreground = ${colors.red}
label-warn            = %percentage:2%%
label-warn-foreground = ${colors.red}

; ── Memory ────────────────────────────────────────────────────
[module/memory]
type                  = internal/memory
interval              = 2
format-prefix         = " "
format-prefix-foreground = ${colors.cyan}
label                 = %percentage_used:2%%
warn-percentage       = 85
label-warn-foreground = ${colors.red}

; ── Filesystem ────────────────────────────────────────────────
[module/fs]
type              = internal/fs
mount-0           = /
interval          = 30
fixed-values      = false
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.yellow}
label-mounted     = %free%

; ── Network ───────────────────────────────────────────────────
[module/network]
type              = internal/network
interface-type    = any
interval          = 2

format-connected          = <label-connected>
label-connected           =  %downspeed:6%   %upspeed:6%
label-connected-foreground = ${colors.fg}

format-disconnected       = <label-disconnected>
label-disconnected        = "  offline"
label-disconnected-foreground = ${colors.red}

; ── Volume ────────────────────────────────────────────────────
[module/volume]
type              = internal/pulseaudio
format-volume     = <ramp-volume> <label-volume>
label-volume      = %percentage%%
label-volume-foreground = ${colors.fg}
label-muted       = " muted"
label-muted-foreground = ${colors.fg-dim}
ramp-volume-0     =
ramp-volume-1     =
ramp-volume-2     =
ramp-volume-foreground = ${colors.magenta}
click-right       = pavucontrol &

; ── Battery ───────────────────────────────────────────────────
[module/battery]
type                   = internal/battery
battery                = BAT0
adapter                = AC
full-at                = 99
low-at                 = 15
poll-interval          = 10

format-charging        = <animation-charging> <label-charging>
label-charging-foreground = ${colors.green}

format-discharging     = <ramp-capacity> <label-discharging>
label-discharging-foreground = ${colors.fg}

format-full            = <label-full>
label-full             = " full"
label-full-foreground  = ${colors.green}

format-low             = <ramp-capacity> <label-low>
label-low              = %percentage%%
label-low-foreground   = ${colors.red}

ramp-capacity-0 =
ramp-capacity-1 =
ramp-capacity-2 =
ramp-capacity-3 =
ramp-capacity-4 =

animation-charging-0   =
animation-charging-1   =
animation-charging-2   =
animation-charging-3   =
animation-charging-4   =
animation-charging-framerate = 750

; ── AI status ─────────────────────────────────────────────────
[module/ai-status]
type              = custom/script
exec              = ~/.local/bin/ai-status-bar
interval          = 10
format            = <label>
format-foreground = ${colors.magenta}
click-left        = alacritty --class float_term -e ollama list &
