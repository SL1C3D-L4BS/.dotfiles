# ══════════════════════════════════════════════════════════════
# Starship prompt — the_architect | 2026 elite
# ══════════════════════════════════════════════════════════════

add_newline = false
command_timeout = 500

format = """
$directory\
$git_branch\
$git_status\
$nix_shell\
$python\
$rust\
$golang\
$nodejs\
$cmd_duration\
$fill\
$jobs\
$status\
$line_break\
$character"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[directory]
style            = "bold blue"
read_only        = " "
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style  = "bold mauve"
format = "[$symbol$branch]($style) "

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style  = "bold red"
ahead  = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged   = "+${count}"
deleted  = "✘${count}"

[nix_shell]
symbol = " "
style  = "bold sapphire"
format = "[$symbol$state( \\($name\\))]($style) "

[python]
symbol = " "
style  = "bold yellow"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style  = "bold peach"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style  = "bold sky"
format = "[$symbol$version]($style) "

[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time       = 1000
format         = "[ $duration]($style) "
style          = "bold yellow"
show_milliseconds = false

[fill]
symbol = " "

[jobs]
symbol = " "
style  = "bold blue"

[status]
disabled = false
symbol   = "✘"
style    = "bold red"
format   = "[$symbol $status]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold mauve)"
