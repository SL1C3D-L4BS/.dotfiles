[global]
# ── Authentication ─────────────────────────────────────────────────────────────
# Fill in your Spotify Premium username/email.
# For password: use `secret-tool store --label=spotifyd application spotifyd`
# then set password_cmd below, or just set password directly (less secure).
username = ""
# password = "your_password_here"
# Recommended: store via libsecret, then use:
# password_cmd = "secret-tool lookup application spotifyd"

# ── Audio backend ──────────────────────────────────────────────────────────────
# Use pipewire-pulse (recommended for your stack)
backend = "pulseaudio"

# ── Device identity ────────────────────────────────────────────────────────────
device_name = "SL1C3D-L4BS"
device_type = "computer"

# ── Quality ────────────────────────────────────────────────────────────────────
# 96 = Normal, 160 = High, 320 = Very High (Premium only)
bitrate = 320

# ── Cache ──────────────────────────────────────────────────────────────────────
cache_path = "/home/the_architect/.cache/spotifyd"
no_audio_cache = false
max_cache_size = 524288000

# ── Normalisation ─────────────────────────────────────────────────────────────
volume_normalisation = true
normalisation_pregain = -10

# ── MPRIS ─────────────────────────────────────────────────────────────────────
# Expose D-Bus MPRIS interface so Quickshell Hub picks it up automatically
use_mpris = true

# ── Autoplay ──────────────────────────────────────────────────────────────────
autoplay = false
