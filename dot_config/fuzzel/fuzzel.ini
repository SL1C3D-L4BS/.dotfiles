# ─────────────────────────────────────────────────────────────────────────────
# Fuzzel — SL1C3D-L4BS tactical minimal bar (black, grey, purple, white)
# https://codeberg.org/dnkl/fuzzel | man fuzzel.ini
# ─────────────────────────────────────────────────────────────────────────────

[main]
font = JetBrainsMono Nerd Font:size=10
use-bold = no
dpi-aware = auto
prompt = "❯ "
placeholder =
match-mode = fzf
fields = filename,name,generic,keywords
sort-result = yes
icons-enabled = no
terminal = ghostty -e {cmd}
layer = overlay
exit-on-keyboard-focus-loss = yes

# Tactical: very top, minimal footprint
anchor = top
y-margin = 8
width = 38
lines = 5
hide-prompt = yes
hide-before-typing = yes

# Minimal padding
vertical-pad = 4
horizontal-pad = 12
inner-pad = 0

[colors]
background = 0d0d0dff
text = 909090ff
message = 909090ff
prompt = 909090ff
placeholder = 909090ff
input = f8f8f2ff
match = b366ffff
selection = 1a1a1aff
selection-text = f8f8f2ff
selection-match = b366ffff
counter = 909090ff
border = 2d2d2dff

[border]
width = 1
radius = 4
selection-radius = 4
