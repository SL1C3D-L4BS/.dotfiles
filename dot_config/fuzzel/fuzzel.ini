# ─────────────────────────────────────────────────────────────────────────────
# Fuzzel — SL1C3D-L4BS branded, dmenu-style search bar at top
# https://codeberg.org/dnkl/fuzzel | man fuzzel.ini
# Brand: bg #0d0d0d, surface #1a1a1a, border #2d2d2d, fg #f8f8f2, accent #5865F2, logo #b366ff
# ─────────────────────────────────────────────────────────────────────────────

[main]
font = JetBrainsMono Nerd Font:size=11
use-bold = yes
dpi-aware = auto
prompt = "❯ "
placeholder =
match-mode = fzf
fields = filename,name,generic,keywords
sort-result = yes
icons-enabled = yes
terminal = ghostty -e {cmd}
layer = overlay
exit-on-keyboard-focus-loss = yes

# Dmenu-style: bar at top, list appears on type
anchor = top
y-margin = 56
width = 80
lines = 8
hide-prompt = yes
hide-before-typing = yes

# Slim bar
vertical-pad = 6
horizontal-pad = 20
inner-pad = 0

[colors]
background = 0d0d0dff
text = e0e0e0ff
message = 909090ff
prompt = 909090ff
placeholder = 909090ff
input = f8f8f2ff
match = b366ffff
selection = 1a1a1aff
selection-text = f8f8f2ff
selection-match = b366ffff
counter = 909090ff
border = 2d2d2dff

[border]
width = 1
radius = 8
selection-radius = 6
