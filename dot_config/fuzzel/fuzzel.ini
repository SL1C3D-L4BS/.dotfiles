# ─────────────────────────────────────────────────────────────────────────────
# Fuzzel — SL1C3D-L4BS: long thin bar, top, typeable, depth
# Black / grey / purple / white. Prompt visible so input works.
# ─────────────────────────────────────────────────────────────────────────────

[main]
font = JetBrains Mono Nerd Font:size=11
use-bold = no
dpi-aware = auto
prompt = " "
placeholder = search…
match-mode = fzf
fields = filename,name,generic,keywords
sort-result = yes
icons-enabled = no
terminal = ghostty -e {cmd}
layer = overlay
exit-on-keyboard-focus-loss = yes

# Long bar across top, thin, list visible for feedback
anchor = top
y-margin = 8
width = 56
lines = 6
hide-prompt = no
hide-before-typing = no

# Thin bar, clear separation from list
vertical-pad = 3
horizontal-pad = 14
inner-pad = 2
line-height = 20

[colors]
background = 0d0d0dff
text = 909090ff
message = 909090ff
prompt = 5865f2ff
placeholder = 404040ff
input = f8f8f2ff
match = b366ffff
selection = 252525ff
selection-text = f8f8f2ff
selection-match = b366ffff
counter = 909090ff
border = 2d2d2dff

[border]
width = 1
radius = 6
selection-radius = 4
