# ─────────────────────────────────────────────────────────────────────────────
# Fuzzel — SL1C3D-L4BS branded, minimal, advanced
# https://codeberg.org/dnkl/fuzzel | man fuzzel.ini
# ─────────────────────────────────────────────────────────────────────────────

[main]
font = JetBrainsMono Nerd Font:size=11
use-bold = yes
dpi-aware = auto
prompt = "> "
placeholder =
match-mode = fzf
fields = filename,name,generic,keywords
sort-result = yes
icons-enabled = yes
terminal = ghostty -e {cmd}
anchor = top
y-margin = 56
lines = 12
width = 42
horizontal-pad = 24
vertical-pad = 10
inner-pad = 4
layer = overlay
exit-on-keyboard-focus-loss = yes

[colors]
background = 0d0d0dff
text = e0e0e0ff
message = 909090ff
prompt = 909090ff
placeholder = 909090ff
input = f8f8f2ff
match = b366ffff
selection = 1a1a1aff
selection-text = f8f8f2ff
selection-match = b366ffff
counter = 909090ff
border = 2d2d2dff

[border]
width = 1
radius = 12
selection-radius = 6
