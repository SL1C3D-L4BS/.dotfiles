# ─────────────────────────────────────────────────────────────────────────────
# Walker — SL1C3D-L4BS launcher (replaces Fuzzel)
# https://github.com/abenz1267/walker
# ─────────────────────────────────────────────────────────────────────────────

force_keyboard_focus = true
close_when_open      = true
click_to_close       = true
selection_wrap       = true
exact_search_prefix  = "'"
theme                = "sl1c3d"

[ui]
anchor_top    = true
anchor_bottom = false
anchor_left   = false
anchor_right  = false
margins       = { top = 8, left = 0, right = 0, bottom = 0 }

[placeholders]
"default"             = { input = "󰍉  Search",     list = "No results" }
"desktopapplications" = { input = "󰣆  Launch app", list = "No apps found" }
"runner"              = { input = "󰆍  Run command", list = "" }
"files"               = { input = "󰉋  Find file",  list = "No files found" }
"websearch"           = { input = "󰖟  Search web", list = "" }
"clipboard"           = { input = "󰅇  Clipboard",  list = "Empty clipboard" }
"ssh"                 = { input = "  SSH host",   list = "No SSH hosts" }
"calc"                = { input = "󰃬  Calculate",  list = "" }

[keybinds]
close             = ["Escape"]
next              = ["Down", "ctrl j", "Tab"]
previous          = ["Up",   "ctrl k", "shift Tab"]
toggle_exact      = ["ctrl e"]
resume_last_query = ["ctrl r"]
activate_context  = ["ctrl space"]
quick_activate    = ["F1", "F2", "F3", "F4", "F5"]

[providers]
default     = ["desktopapplications", "calc", "runner", "websearch"]
empty       = ["desktopapplications"]
max_results = 60

[providers.max_results_provider]
desktopapplications = 20
files               = 30
clipboard           = 20
runner              = 30
ssh                 = 20

# ─── Prefix routing ──────────────────────────────────────────────────────────
[[providers.prefixes]]
prefix   = ">"
provider = "runner"

[[providers.prefixes]]
prefix   = "/"
provider = "files"

[[providers.prefixes]]
prefix   = "@"
provider = "websearch"

[[providers.prefixes]]
prefix   = ":"
provider = "clipboard"

[[providers.prefixes]]
prefix   = "s "
provider = "ssh"

[[providers.prefixes]]
prefix   = "="
provider = "calc"
