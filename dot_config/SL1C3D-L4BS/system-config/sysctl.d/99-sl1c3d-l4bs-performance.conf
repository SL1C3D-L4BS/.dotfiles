# SL1C3D-L4BS — kernel tuning for throughput and lower latency
# Install: sudo cp to /etc/sysctl.d/ then: sudo sysctl --system

# TCP: larger buffers, fast open, low latency
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_slow_start_after_idle = 0

# Reduce swap tendency (prefer RAM)
vm.swappiness = 10

# More inotify watches (IDEs, file watchers)
fs.inotify.max_user_watches = 524288
