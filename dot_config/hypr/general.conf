# ─────────────────────────────────────────────────────────────────────────────
# Look & feel — general, decoration, animations, layouts, misc
# Uses colors from colors.conf (source order matters)
# https://wiki.hypr.land/Configuring/Variables/
# ─────────────────────────────────────────────────────────────────────────────

# ─── General ────────────────────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = $accent $accentDim 45deg
    col.inactive_border = $border

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# ─── Decoration ──────────────────────────────────────────────────────────────
decoration {
    rounding = 1
    rounding_power = 2

    active_opacity = 0.92
    inactive_opacity = 0.88

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = $shadow
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        vibrancy = 0.12
    }
}

# ─── Animations ──────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10, default
    animation = border,       1, 5,  easeOutQuint
    animation = windows,      1, 5,  easeOutQuint
    animation = windowsIn,    1, 4,  easeOutQuint, popin 87%
    animation = windowsOut,   1, 1.5, linear, popin 87%
    animation = fadeIn,       1, 1.7, almostLinear
    animation = fadeOut,      1, 1.5, almostLinear
    animation = fade,          1, 3,   quick
    animation = layers,       1, 4,  easeOutQuint
    animation = layersIn,     1, 4,  easeOutQuint, fade
    animation = layersOut,    1, 1.5, linear, fade
    animation = fadeLayersIn,  1, 1.8, almostLinear
    animation = fadeLayersOut, 1, 1.4, almostLinear
    animation = workspaces,    1, 2,  almostLinear, fade
    animation = workspacesIn,  1, 1.2, almostLinear, fade
    animation = workspacesOut, 1, 2,  almostLinear, fade
    animation = zoomFactor,    1, 7,  quick
}

# ─── Dwindle layout ─────────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

# ─── Master layout ──────────────────────────────────────────────────────────
master {
    new_status = master
}

# ─── Misc ───────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}
