# ─────────────────────────────────────────────────────────────────────────────
# hypridle — idle lock and optional dim/suspend (SL1C3D-L4BS)
# ─────────────────────────────────────────────────────────────────────────────

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Lock after 5 min idle
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Optional: dim / reduce brightness after 2.5 min (uncomment if brightnessctl installed)
# listener {
#     timeout = 150
#     on-timeout = brightnessctl -s set 10
#     on-resume = brightnessctl -r
# }

# Optional: screen off after 5.5 min
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Optional: suspend after 30 min (uncomment to enable)
# listener {
#     timeout = 1800
#     on-timeout = systemctl suspend
# }
