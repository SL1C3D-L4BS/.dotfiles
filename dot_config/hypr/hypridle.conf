# ─────────────────────────────────────────────────────────────────────────────
# hypridle — idle lock and optional dim/suspend (SL1C3D-L4BS)
# Sequence: 2.5min dim → 5min lock + screen off → 30min suspend
# ─────────────────────────────────────────────────────────────────────────────

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Dim brightness at 2.5 min idle (signal that lock is coming)
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 8%
    on-resume = brightnessctl -r
}

# Lock after 5 min idle
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Screen off after 5.5 min (saves power, keeps lock)
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 min idle
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
