# ─────────────────────────────────────────────────────────────────────────────
# Hyprland — main config (2026). Split into multiple files for clarity.
# https://wiki.hypr.land/Configuring/
# ─────────────────────────────────────────────────────────────────────────────

# Brand colors (white, black, grey, Discord Blurple) — must be first for $accent etc.
source = ~/.config/hypr/colors.conf

# Hardware & environment
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/env.conf

# Programs & modifiers (used in binds)
source = ~/.config/hypr/programs.conf

# Autostart (bar, tray, etc.)
source = ~/.config/hypr/autostart.conf

# Look & feel (general, decoration, animations, layouts, misc)
source = ~/.config/hypr/general.conf

# Input (keyboard, touchpad, gestures, devices)
source = ~/.config/hypr/input.conf

# Keybinds & mouse
source = ~/.config/hypr/binds.conf

# Window & workspace rules
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/layers.conf

# Editions & host overlays (generated; not managed by chezmoi)
source = ~/.config/hypr/edition.conf
source = ~/.config/hypr/host.conf

# Optional: local overrides (not managed by chezmoi). Create this file to add personal keybinds or settings.
source = ~/.config/hypr/custom.conf
