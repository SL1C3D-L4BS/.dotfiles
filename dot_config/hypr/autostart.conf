# ─────────────────────────────────────────────────────────────────────────────
# Autostart — bars, daemons, optional apps
# ─────────────────────────────────────────────────────────────────────────────

# exec-once = $terminal
# exec-once = nm-applet &

# Wallpaper: restore last, or set sl1c3d-l4bs-09.png if no state (e.g. first run after chezmoi apply)
exec-once = waypaper --restore || waypaper --wallpaper ~/assets/wallpapers/sl1c3d-l4bs-09.png --fill fill --monitor All --backend swaybg

# Quickshell bar: delay so Wayland is ready, then run with auto-restart so it never disappears
exec-once = sleep 2 && ~/.config/hypr/scripts/start-quickshell.sh &
