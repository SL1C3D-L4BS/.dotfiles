# ─────────────────────────────────────────────────────────────────────────────
# Autostart — minimal glue only (Phase 6, TTY-only, no UWSM)
# Durable daemons run as systemd user units; started here via systemctl --user
# because TTY login does not activate graphical-session.target. No chezmoi apply.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Polkit agent ─────────────────────────────────────────────────────────────
exec-once = hyprpolkitagent

# ─── Gnome Keyring ────────────────────────────────────────────────────────────
exec-once = /usr/lib/gnome-keyring-daemon --start --components=secrets,pkcs11,ssh

# ─── XDG portals (env export then portal start) ────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = sleep 1 && systemctl --user start xdg-desktop-portal-hyprland xdg-desktop-portal

# ─── Session daemons (Phase 6 user units) ─────────────────────────────────────
# Script waits 2s and re-exports Wayland env so bar/wallpaper start reliably after reboot.
exec-once = ~/.config/hypr/scripts/start-session-daemons.sh

# ─── hyprsunset one-shot (blue-light; keybinds in binds.conf) ─────────────────
exec-once = hyprsunset -t 5000

# ─── OpenClaw: openclaw-gateway.service (user unit; start manually if needed).
