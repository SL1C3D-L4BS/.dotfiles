# ─────────────────────────────────────────────────────────────────────────────
# Autostart — bars, daemons, optional apps
# ─────────────────────────────────────────────────────────────────────────────

# exec-once = $terminal
# exec-once = nm-applet &

# Wallpaper: restore last, or set sl1c3d-l4bs-09.png if no state (e.g. first run after chezmoi apply)
exec-once = waypaper --restore || waypaper --wallpaper ~/assets/wallpapers/sl1c3d-l4bs-09.png --fill fill --monitor All --backend swaybg

# Quickshell bar: one process, one bar per monitor. Delay so Wayland is ready.
exec-once = sleep 2 && quickshell

# Notifications (mako)
exec-once = mako

# Idle: lock and optional dim/suspend (hypridle → hyprlock)
exec-once = hypridle

# OpenClaw gateway (AI sidebar at http://127.0.0.1:18789/). Uses full path so it runs on boot without PATH.
exec-once = test -x ~/.openclaw/bin/openclaw && ~/.openclaw/bin/openclaw gateway start
