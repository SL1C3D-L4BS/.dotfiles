# ─────────────────────────────────────────────────────────────────────────────
# Autostart — bars, daemons, optional apps
# SL1C3D-L4BS 2026
# ─────────────────────────────────────────────────────────────────────────────

# Dotfiles: re-apply on every session start so config (fonts, etc.) never drifts after reboot
exec-once = chezmoi apply

# ─── Polkit agent: hyprpolkitagent (native Hyprland renderer, replaces polkit-gnome) ──
exec-once = hyprpolkitagent

# ─── Gnome Keyring daemon (secrets service for Firefox, Electron, spotifyd) ──
exec-once = /usr/lib/gnome-keyring-daemon --start --components=secrets,pkcs11,ssh

# ─── XDG portals (screenshare, file pickers) ─────────────────────────────────
# Correct pattern: export env vars first, then let systemd socket activation handle portals
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = sleep 1 && systemctl --user start xdg-desktop-portal-hyprland xdg-desktop-portal

# ─── Wallpaper: swww daemon + restore last wallpaper ────────────────────────
exec-once = swww-daemon --format xrgb
exec-once = sleep 0.5 && waypaper --restore

# ─── Quickshell bar: one process, one bar per monitor ───────────────────────
exec-once = sleep 2 && quickshell

# ─── AGS (quicksettings panel). Super+I toggles. ────────────────────────────
exec-once = sleep 3 && ags run -d ~/.config/ags

# ─── Notifications (swaync — replaces mako; adds notification center + MPRIS) ──
exec-once = swaync

# ─── Clipboard history (cliphist) ────────────────────────────────────────────
exec-once = wl-paste --watch cliphist store

# ─── Idle: lock and dim (hypridle → hyprlock) ────────────────────────────────
exec-once = hypridle

# ─── hyprsunset: blue-light / color temperature ───────────────────────────────
# v0.3.3 is one-shot (no daemon). Apply a neutral day temp at login.
# Toggle keybinds: Super+F10 = night (3200K), Super+Shift+F10 = identity, Super+Ctrl+F10 = day (5000K)
exec-once = hyprsunset -t 5000

# ─── OpenClaw gateway is managed by systemd user unit: openclaw-gateway.service ─
