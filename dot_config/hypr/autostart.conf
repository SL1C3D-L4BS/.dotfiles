# ─────────────────────────────────────────────────────────────────────────────
# Autostart — minimal glue only (Phase 6)
# Durable daemons run as systemd user units (graphical-session.target).
# No chezmoi apply on login.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Polkit agent ─────────────────────────────────────────────────────────────
exec-once = hyprpolkitagent

# ─── Gnome Keyring ────────────────────────────────────────────────────────────
exec-once = /usr/lib/gnome-keyring-daemon --start --components=secrets,pkcs11,ssh

# ─── XDG portals (env export then portal start) ────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = sleep 1 && systemctl --user start xdg-desktop-portal-hyprland xdg-desktop-portal

# ─── hyprsunset one-shot (blue-light; keybinds in binds.conf) ─────────────────
exec-once = hyprsunset -t 5000

# ─── Durable daemons: quickshell, swaync, cliphist, wallpaper, hypridle, ags ─
#     are started by systemd user units (WantedBy=graphical-session.target).
# ─── OpenClaw: openclaw-gateway.service (user unit).
