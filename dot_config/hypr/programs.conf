# Attach to SL1C3D-L4BS (resurrects if dead); start new session only if none exists
$terminal   = ghostty -e sh -c 'zellij attach SL1C3D-L4BS || exec zellij -s SL1C3D-L4BS'
$fileManager = yazi
$menu        = fuzzel
$mainMod     = SUPER
