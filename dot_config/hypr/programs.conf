# ─────────────────────────────────────────────────────────────────────────────
# Program keywords — terminal, file manager, menu, etc.
# https://wiki.hypr.land/Configuring/Keywords/
# ─────────────────────────────────────────────────────────────────────────────

# Each new terminal = new Zellij session with branded name + random dev quote. Attach: zellij attach "SL1C3D-L4BS — …"
$terminal   = ghostty -e ~/.config/hypr/scripts/zellij-branded.sh
$fileManager = yazi
$menu        = fuzzel
$mainMod     = SUPER
