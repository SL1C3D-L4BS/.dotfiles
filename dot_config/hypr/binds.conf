# ─────────────────────────────────────────────────────────────────────────────
# Keybinds & mouse — https://wiki.hypr.land/Configuring/Binds/
# SL1C3D-L4BS 2026 — Elite keybinds: HJKL, resize, screenshot, clipboard, power
# ─────────────────────────────────────────────────────────────────────────────

# ─── Core apps ───────────────────────────────────────────────────────────────
bind = $mainMod, slash,       exec, ~/.config/hypr/scripts/keybinds.sh
bind = $mainMod, Return,      exec, $terminal
bind = $mainMod, Q,           killactive
bind = $mainMod, F,           exec, $fileManager
bind = $mainMod, B,           exec, btop
bind = $mainMod, G,           exec, lazygit
bind = $mainMod, E,           exec, $EDITOR
bind = $mainMod, V,           togglefloating
bind = $mainMod, Space,       exec, $menu
bind = $mainMod, A,           exec, ~/.config/hypr/scripts/overview.sh
bind = $mainMod, Tab,         exec, ~/.config/hypr/scripts/overview-preview.sh
bind = $mainMod, ISO_Left_Tab, exec, ~/.config/hypr/scripts/overview-preview.sh
bind = $mainMod SHIFT, A,     exec, ~/.config/hypr/scripts/openclaw-sidebar.sh
bind = $mainMod, I,           exec, ~/.config/hypr/scripts/toggle-quicksettings.sh
bind = $mainMod, P,           pseudo
bind = $mainMod, O,           layoutmsg, togglesplit

# ─── Focus — arrow keys (keep) ───────────────────────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ─── Focus — HJKL (Vim-style, elite standard) ────────────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ─── Move windows — HJKL ─────────────────────────────────────────────────────
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# ─── Resize — CTRL+HJKL (repeat-capable) ────────────────────────────────────
binde = $mainMod CTRL, H,     resizeactive, -30 0
binde = $mainMod CTRL, L,     resizeactive,  30 0
binde = $mainMod CTRL, K,     resizeactive,  0 -30
binde = $mainMod CTRL, J,     resizeactive,  0  30
binde = $mainMod CTRL, left,  resizeactive, -30 0
binde = $mainMod CTRL, right, resizeactive,  30 0
binde = $mainMod CTRL, up,    resizeactive,  0 -30
binde = $mainMod CTRL, down,  resizeactive,  0  30

# ─── Move window to monitor ──────────────────────────────────────────────────
bind = $mainMod SHIFT, comma,  movewindow, mon:-1
bind = $mainMod SHIFT, period, movewindow, mon:+1

# ─── Workspaces 1–10 ─────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ─── Special workspace (scratchpad) ──────────────────────────────────────────
bind = $mainMod, S,             togglespecialworkspace, magic
bind = $mainMod SHIFT, S,       movetoworkspace, special:magic

# ─── Scratchpad terminal (Super+`) — summon/hide floating terminal ────────────
bind = $mainMod, grave,         togglespecialworkspace, scratchterm
bind = $mainMod SHIFT, grave,   movetoworkspace, special:scratchterm

# ─── On-demand floating utility scratchpads ──────────────────────────────────
# scratch-toggle: spawns on first press, toggles on subsequent presses
bind = $mainMod SHIFT, B, exec, ~/.config/hypr/scripts/scratch-toggle.sh \
    btop btop-scratch \
    "ghostty --class=btop-scratch -e btop"

bind = $mainMod SHIFT, Y, exec, ~/.config/hypr/scripts/scratch-toggle.sh \
    yazi yazi-scratch \
    "ghostty --class=yazi-scratch -e yazi"

bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/scratch-toggle.sh \
    nvim-scratch nvim-scratch \
    "ghostty --class=nvim-scratch -e nvim ~/scratch.md"

bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/scratch-toggle.sh \
    nmtui nmtui-scratch \
    "ghostty --class=nmtui-scratch -e nmtui"

bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/scratch-toggle.sh \
    lazygit lazygit-scratch \
    "ghostty --class=lazygit-scratch -e lazygit"

bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/scratch-toggle.sh \
    python-scratch python-scratch \
    "ghostty --class=python-scratch -e python3"

bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/scratch-toggle.sh \
    dev-timer dev-timer-scratch \
    "ghostty --class=dev-timer-scratch -e ~/.config/hypr/scripts/dev-timer.sh"

bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/spotifyd-toggle.sh

# ─── Scroll workspaces with mouse ────────────────────────────────────────────
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ─── Move/resize with mouse ──────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ─── Media & brightness ──────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause

# ─── Lock ────────────────────────────────────────────────────────────────────
bind = $mainMod, XF86Lock,   exec, hyprlock
bind = $mainMod, L,          exec, hyprlock

# ─── Power menu (Fuzzel-based: lock/suspend/logout/reboot/shutdown) ───────────
bind = $mainMod SHIFT, M,    exec, ~/.config/hypr/scripts/power-menu.sh
bind = $mainMod, M,          exec, ~/.config/hypr/scripts/power-menu.sh

# ─── Screenshots (grim + slurp) ──────────────────────────────────────────────
# Region → save to ~/Pictures/Screenshots/
bind = , Print,                exec, ~/.config/hypr/scripts/screenshot.sh region
# Fullscreen → save
bind = SHIFT, Print,           exec, ~/.config/hypr/scripts/screenshot.sh full
# Region → copy to clipboard (no file)
bind = CTRL, Print,            exec, ~/.config/hypr/scripts/screenshot.sh region-copy
# Active window → save
bind = ALT, Print,             exec, ~/.config/hypr/scripts/screenshot.sh window
# Super+Print = region (also available without modifier conflict)
bind = $mainMod, Print,        exec, ~/.config/hypr/scripts/screenshot.sh region

# ─── Clipboard history (cliphist → fuzzel → wl-copy) ─────────────────────────
bind = $mainMod, semicolon,  exec, cliphist list | fuzzel --dmenu --lines=12 --width=52 --prompt="Clipboard: " | cliphist decode | wl-copy

# ─── Notifications (mako) ────────────────────────────────────────────────────
bind = $mainMod, N,         exec, makoctl dismiss
bind = $mainMod SHIFT, N,   exec, makoctl dismiss -a
bind = $mainMod, D,         exec, makoctl mode -a do-not-disturb
bind = $mainMod SHIFT, D,   exec, makoctl mode -r do-not-disturb
