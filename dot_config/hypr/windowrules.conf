# ─────────────────────────────────────────────────────────────────────────────
# Window & workspace rules — https://wiki.hypr.land/Configuring/Window-Rules/
# SL1C3D-L4BS 2026 — elite float/center/opacity/PiP rules
# ─────────────────────────────────────────────────────────────────────────────

# ─── Global: suppress maximize events (keep tiling) ─────────────────────────
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# ─── XWayland: fix drag artifacts ────────────────────────────────────────────
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# ─── hyprland-run popup ───────────────────────────────────────────────────────
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# ─── Terminal: Ghostty — translucent, rounded ─────────────────────────────────
windowrule {
    name = ghostty-opacity
    match:class = ^com\.mitchellh\.ghostty$
    opacity = 0.94 0.88
}

# ─── Scratchpad terminal — float + center ────────────────────────────────────
windowrule {
    name = scratchpad-terminal
    match:class = ^ghostty-scratch$
    workspace = special:scratchterm
    float = yes
    size = 1200 700
    center = yes
    opacity = 0.96 0.92
}

# ─── Audio: pavucontrol ───────────────────────────────────────────────────────
windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol|pavucontrol-qt)$
    float = yes
    size = 720 480
    center = yes
}

# ─── Network manager ─────────────────────────────────────────────────────────
windowrule {
    name = float-nm-applet
    match:class = ^(nm-applet|nm-connection-editor)$
    float = yes
    center = yes
}

# ─── Waypaper (wallpaper picker) ─────────────────────────────────────────────
windowrule {
    name = float-waypaper
    match:class = ^waypaper$
    float = yes
    size = 900 600
    center = yes
}

# ─── System tools: theming ────────────────────────────────────────────────────
windowrule {
    name = float-theming
    match:class = ^(nwg-look|qt6ct|kvantum|lxappearance)$
    float = yes
    center = yes
}

# ─── Polkit authentication dialog ────────────────────────────────────────────
windowrule {
    name = float-polkit
    match:class = ^(polkit-gnome-authentication-agent-1|org\.gnome\.PolicyKit1\.AuthenticationAgent|org\.kde\.polkit-kde-authentication-agent)$
    float = yes
    center = yes
    size = 460 260
}

# ─── File picker / save dialog (XDG portal) ──────────────────────────────────
windowrule {
    name = float-file-dialog
    match:title = ^(Open File|Open Folder|Save File|Save As|Select File)$
    float = yes
    size = 920 620
    center = yes
}

windowrule {
    name = float-xdg-portal
    match:class = ^xdg-desktop-portal-gtk$
    float = yes
    center = yes
}

# ─── Picture-in-Picture (float, pinned, bottom-right) ────────────────────────
windowrule {
    name = pip
    match:title = ^Picture-in-Picture$
    float = yes
    pin = yes
    size = 480 270
    move = 100%-498 100%-288
    opacity = 1.0 1.0
}

# ─── Calendar popup: float + center ──────────────────────────────────────────
windowrule {
    name = float-calendar
    match:class = ^Gnome-calendar$
    float = yes
    center = yes
}

# ─── Bluetooth manager ───────────────────────────────────────────────────────
windowrule {
    name = float-bluetooth
    match:class = ^(blueman-manager|blueberry\.py)$
    float = yes
    center = yes
    size = 600 400
}

# ─── Dev Timer scratchpad (Super+Shift+T) ────────────────────────────────────
windowrule {
    name = scratch-dev-timer
    match:class = ^dev-timer-scratch$
    float = yes
    center = yes
    size = 460 440
    workspace = special:dev-timer
    opacity = 0.97 0.94
    rounding = 16
}

# ─── About dialogs (small, center) ───────────────────────────────────────────
windowrule {
    name = float-about
    match:title = ^About.*$
    float = yes
    center = yes
}

# ─── Confirm/error dialogs ───────────────────────────────────────────────────
windowrule {
    name = float-dialogs
    match:class = ^(confirm|dialog|download|error|notification|splash|toolbar)$
    float = yes
    center = yes
}

# ─── Cursor theme picker ──────────────────────────────────────────────────────
windowrule {
    name = float-cursor-picker
    match:class = ^cursor-theme-picker$
    float = yes
    center = yes
}

