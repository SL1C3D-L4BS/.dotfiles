# ─────────────────────────────────────────────────────────────────────────────
# hyprsunset — SL1C3D-L4BS blue-light control
# Version: v0.3.3 (one-shot CLI, no daemon/config-file support)
# Usage: hyprsunset -t <temp_K>   |  hyprsunset -i (identity/reset)
#
# Keybinds (set in binds.conf):
#   Super+F10        → hyprsunset -t 3200  (night — warm)
#   Super+Shift+F10  → hyprsunset -i       (identity — reset to neutral)
#   Super+Ctrl+F10   → hyprsunset -t 5000  (day — slightly warm)
#
# Autostart (autostart.conf):
#   exec-once = hyprsunset -t 5000   (apply day temp at login)
#
# Typical values:
#   6500K = daylight (neutral, no filter)
#   5000K = slightly warm / good for mixed lighting
#   4500K = evening warm
#   3200K = night mode (strong warm filter)
# ─────────────────────────────────────────────────────────────────────────────
