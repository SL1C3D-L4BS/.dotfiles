# ─────────────────────────────────────────────────────────────────────────────
# hyprsunset — blue-light/color-temperature control (SL1C3D-L4BS)
# Loaded via exec-once = hyprsunset in autostart.conf
# Manual: hyprctl hyprsunset temperature 3200 | identity | reset
# ─────────────────────────────────────────────────────────────────────────────

# Maximum gamma adjustment (100 = no adjustment, < 100 = darker)
max-gamma = 120

# ─── Time-based profiles ─────────────────────────────────────────────────────

# Morning: identity (neutral, no filter)
profile {
    time        = 6:30
    identity    = true
}

# Evening: warm (4500K)
profile {
    time        = 20:00
    temperature = 4500
    gamma       = 1.0
}

# Night: strong warm filter (3200K)
profile {
    time        = 22:30
    temperature = 3200
    gamma       = 0.95
}
