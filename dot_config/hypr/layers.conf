# ─────────────────────────────────────────────────────────────────────────────
# Layer rules — glass engine (SL1C3D-L4BS)
# Requires layer namespaces; inspect with: hyprctl layers
# ─────────────────────────────────────────────────────────────────────────────

# Quickshell (bar + popups). Subtle glass.
layerrule = blur on, match:namespace quickshell
layerrule = blur_popups on, match:namespace quickshell
layerrule = ignore_alpha 0.25, match:namespace quickshell

# AGS (quicksettings/OSD/powermenu) — common namespaces for AGS/Astal layer surfaces.
layerrule = blur on, match:namespace ags
layerrule = blur_popups on, match:namespace ags
layerrule = ignore_alpha 0.25, match:namespace ags

layerrule = blur on, match:namespace astal
layerrule = blur_popups on, match:namespace astal
layerrule = ignore_alpha 0.25, match:namespace astal

# swaync notifications + control center — glass backdrop
layerrule = blur on, match:namespace swaync-notification-window
layerrule = blur_popups on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.15, match:namespace swaync-notification-window

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur_popups on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.15, match:namespace swaync-control-center

# Hyprlock — strong blur on background
layerrule = blur on, match:namespace hyprlock
layerrule = ignore_alpha 0.1, match:namespace hyprlock
