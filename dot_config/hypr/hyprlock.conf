# ─────────────────────────────────────────────────────────────────────────────
# hyprlock — SL1C3D-L4BS theme (bg #0d0d0d, fg #f8f8f2, accent #5865F2)
# ─────────────────────────────────────────────────────────────────────────────

general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    color = rgba(13, 13, 13, 1.0)
    blur_passes = 2
    contrast = 0.9
    brightness = 0.8
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgba(45, 45, 45, 0.9)
    inner_color = rgba(26, 26, 26, 0.95)
    font_color = rgba(248, 248, 242, 0.95)
    placeholder_text = <span foreground="##909090">Password...</span>
    fade_on_empty = true
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(248, 248, 242, 0.95)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(248, 248, 242, 0.7)
    font_size = 22
    font_family = JetBrains Mono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}
