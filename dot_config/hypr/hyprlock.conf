# ─────────────────────────────────────────────────────────────────────────────
# hyprlock — SL1C3D-L4BS theme (bg #0d0d0d, fg #f8f8f2, accent #5865F2)
# Layout: clock top-center, date below, username, input field bottom
# ─────────────────────────────────────────────────────────────────────────────

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 5
    noise = 0.02
    contrast = 0.85
    brightness = 0.75
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

# ─── Large clock ─────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(248, 248, 242, 0.95)
    font_size = 96
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.5)
}

# ─── Date ────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d %Y')"
    color = rgba(248, 248, 242, 0.65)
    font_size = 20
    font_family = JetBrains Mono Nerd Font
    position = 0, 28
    halign = center
    valign = center
}

# ─── Username ─────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:0] echo " $(whoami)"
    color = rgba(144, 144, 144, 0.85)
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 0, -52
    halign = center
    valign = center
}

# ─── Input field ──────────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 300, 56
    outline_thickness = 3
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(88, 101, 242, 0.85)
    inner_color = rgba(26, 26, 26, 0.95)
    font_color = rgba(248, 248, 242, 0.95)
    fade_on_empty = true
    placeholder_text = <span foreground="##909090"> Password</span>
    check_color = rgba(88, 101, 242, 1.0)
    fail_color = rgba(255, 85, 85, 0.95)
    fail_text = <span foreground="##ff5555"> Wrong password</span>
    fail_transition = 300
    capslock_color = rgba(241, 250, 140, 0.9)
    position = 0, -130
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.4)
}
