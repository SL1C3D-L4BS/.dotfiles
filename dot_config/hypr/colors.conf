# ─────────────────────────────────────────────────────────────────────────────
# Brand colors: white, black, grey, Discord Blurple / Dracula-inspired
# Discord Blurple: #5865F2 | Dracula purple: #BD93F9 | Dracula bg: #282A36
# ─────────────────────────────────────────────────────────────────────────────

# Primary accent — Discord Blurple (#5865F2)
$accent       = rgba(5865f2ff)
$accentDim    = rgba(5865f299)
$accentDim2   = rgba(5865f266)

# Neutrals — black & grey scale (Dracula-inspired)
$bg           = rgba(0d0d0dff)
$bgElevated   = rgba(1a1a1aff)
$bgSurface    = rgba(282a36ff)
$border       = rgba(2d2d2dff)
$borderDim    = rgba(40404099)

# Foreground — white & light grey
$fg           = rgba(f8f8f2ff)
$fgDim        = rgba(e0e0e0ff)
$fgMuted      = rgba(909090ff)

# Shadow (black with alpha)
$shadow       = rgba(00000099)
