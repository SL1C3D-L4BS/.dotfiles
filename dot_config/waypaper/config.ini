# ─────────────────────────────────────────────────────────────────────────────
# Waypaper — SL1C3D-L4BS | Hyprland wallpaper (advanced 2026)
# Default: sl1c3d-l4bs-09.png on all monitors. Restore: exec-once = waypaper --restore
# Requires one backend: swaybg, swww, or hyprpaper (paru -S swww or swaybg)
# ─────────────────────────────────────────────────────────────────────────────

[Settings]
language = en
folder = ~/assets/wallpapers
wallpaper = ~/assets/wallpapers/sl1c3d-l4bs-09.png
backend = swaybg
monitors = All
fill = Fill
sort = name
color = #0d0d0d
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
show_path_in_tooltip = True
number_of_columns = 3
use_xdg_state = True
zen_mode = False
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
post_command = 
keybindings = ~/.config/waypaper/keybindings.ini
