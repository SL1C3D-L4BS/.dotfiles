<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- SL1C3D-L4BS: global default — JetBrains Mono Nerd Font (elite 2026) -->
<fontconfig>
  <!-- Prefer JetBrains Mono Nerd Font for monospace (terminal, editors, code) -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrains Mono Nerd Font</family>
      <family>JetBrains Mono</family>
    </prefer>
  </alias>
  <!-- Optional: same for sans-serif so UI defaults to JetBrains when requested -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>JetBrains Mono Nerd Font</family>
      <family>JetBrains Mono</family>
    </prefer>
  </alias>
</fontconfig>
