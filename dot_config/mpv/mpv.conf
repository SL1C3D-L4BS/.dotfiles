# ─────────────────────────────────────────────────────────────────────────────
# mpv — SL1C3D-L4BS (2026)
# Hardware-accelerated, branded OSD, PipeWire audio
# ─────────────────────────────────────────────────────────────────────────────

# ─── Video ────────────────────────────────────────────────────────────────────
hwdec           = auto-safe          # hardware decode (VAAPI/VDPAU auto)
gpu-api         = vulkan             # prefer Vulkan for modern GPU
gpu-context     = auto
vo              = gpu

# ─── Audio ────────────────────────────────────────────────────────────────────
audio-device    = auto
ao              = pipewire
volume          = 90
volume-max      = 100

# ─── OSD (brand colors) ───────────────────────────────────────────────────────
osd-font        = "JetBrains Mono Nerd Font"
osd-font-size   = 32
osd-color       = "#f8f8f2"
osd-border-color = "#0d0d0d"
osd-border-size = 2
osd-bar         = yes
osd-bar-h       = 2.5
osd-bar-align-y = -1
osd-shadow-offset = 1

# ─── Subtitles ────────────────────────────────────────────────────────────────
sub-font        = "Inter"
sub-font-size   = 38
sub-color       = "#f8f8f2"
sub-border-color = "#0d0d0d"
sub-border-size = 2.5
sub-shadow-offset = 1
sub-auto        = fuzzy

# ─── Behavior ─────────────────────────────────────────────────────────────────
save-position-on-quit = yes
resume-playback       = yes
keep-open             = yes
loop-playlist         = inf
force-window          = yes

# ─── Screenshots ──────────────────────────────────────────────────────────────
screenshot-format    = png
screenshot-directory = ~/Pictures/Screenshots
screenshot-template  = "mpv-%F-%P"
