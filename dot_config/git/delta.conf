# ─────────────────────────────────────────────────────────────────────────────
# Delta pager — include from ~/.config/git/config when delta is installed.
# paru -S delta
# ─────────────────────────────────────────────────────────────────────────────

[core]
	pager = delta

[interactive]
	diffFilter = delta --color-only

[delta]
	navigate = true
	lineNumbers = true
	dark = true

# conflictStyle lives in ~/.config/git/config under [merge], not duplicated here
