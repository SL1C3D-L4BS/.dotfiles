# ─────────────────────────────────────────────────────────────────────────────
# Starship — SL1C3D-L4BS | floating pill/segment style, brand palette
# ─────────────────────────────────────────────────────────────────────────────

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
scan_timeout = 20
palette = "brand"

# Brand palette (matches ~/.config/hypr/colors.conf)
[palettes.brand]
accent   = "#5865F2"
bg       = "#0d0d0d"
surface  = "#1a1a1a"
border   = "#2d2d2d"
fg       = "#f8f8f2"
fgdim    = "#e0e0e0"
muted    = "#909090"
success  = "#5865F2"
error    = "#ff5555"
warn     = "#f1fa8c"

# Segment/pill layout: directory | git | character; time on right (all brand-colored)
format = """
$directory\
$git_branch\
$git_status\
$character"""

right_format = "$time"

# ─── Character (prompt symbol) — Nerd Font ───────────────────────────────────
[character]
success_symbol = "[\uE0B0](bold fg:accent)"
error_symbol   = "[\uE0B0](bold fg:error)"
vimcmd_symbol  = "[\uE0B2](bold fg:accent)"

# ─── Directory — segment pill + folder icon (Nerd Font) ──────────────────────
[directory]
style = "bg:surface fg:fgdim bold"
truncation_length = 3
truncation_symbol = "…/"
format = "[\uF07B  $path ]($style)"

# ─── Git branch — segment pill + branch icon (Nerd Font) ────────────────────
[git_branch]
symbol = "\uE0A0 "
style = "bg:accent fg:bg bold"
format = "[ $symbol$branch ]($style)"

# ─── Git status — segment pill (bg border, fg muted) ──────────────────────────
[git_status]
style = "bg:border fg:muted"
format = '[\[$all_status$ahead_behind\]]($style)'

# ─── Time (right prompt) — Nerd Font clock ───────────────────────────────────
[time]
style = "fg:muted"
format = "[\uF017 $time]($style) "
time_format = "%I:%M %p"
disabled = false

# ─── Hostname (SSH) — Nerd Font globe ───────────────────────────────────────
[hostname]
ssh_only = true
ssh_symbol = "\uF0AC "
style = "fg:muted"
format = "[$ssh_symbol$hostname]($style) in "

# ─── Command duration — Nerd Font timer ─────────────────────────────────────
[cmd_duration]
min_time = 2000
style = "fg:muted"
format = " [\uF252 $duration]($style) "

# ─── Lang/context — Nerd Font symbols + brand styles ────────────────────────
[package]
disabled = true

[golang]
symbol = "\uE626 "
style = "fg:fgdim"

[nodejs]
symbol = "\uF898 "
style = "fg:fgdim"

[python]
symbol = "\uE235 "
style = "fg:fgdim"

[rust]
symbol = "\uE7A8 "
style = "fg:fgdim"

[conda]
symbol = "\uE001 "
style = "fg:fgdim"

[docker_context]
symbol = "\uF308 "
style = "fg:muted"
